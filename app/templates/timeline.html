{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}

{% block content %}

{# timeline form #}

<section class="timeline">
  <h1>Timeline</h1>

  <form id="timeline-form" class="timeline-form">
    <label for="name">Name</label>
    <input type="text" id="name" name="name" required>

    <label for="email">Email</label>
    <input
  type="email"
  id="email"
  name="email"
  required
  pattern="[^\s@]+@[^\s@]+\.[^\s@]+"
  title="Please include a domain with an extension, e.g. name@example.com"
>

    <label for="content">Message</label>
    <textarea id="content" name="content" rows="3" required></textarea>

    <button type="submit">Post</button>

    <div id="timeline-form-error" class="timeline-form-error" role="alert" hidden></div>


  </form>

  <div id="timeline-posts" class="timeline-posts">
    {# Posts are rendered client-side via fetchPosts() below #}
  </div>
</section>


<script src="{{ url_for('static', filename='vendor/js-sha256/sha256.min.js') }}"></script>

<script>
const form = document.getElementById('timeline-form');
const postsContainer = document.getElementById('timeline-posts');
const nameInput = document.getElementById('name');
const contentInput = document.getElementById('content');

// grab the error container
const formError = document.getElementById('timeline-form-error');

// helpers to show/clear the error message
function showFormError(message) {
  formError.textContent = message;
  formError.hidden = false;
}

function clearFormError() {
  formError.textContent = '';
  formError.hidden = true;
}


function sha256Hex(str) {
  return sha256(str);
}

function gravatarUrl(email) {
  const hash = sha256Hex(email.trim().toLowerCase());
  return `https://www.gravatar.com/avatar/${hash}?d=identicon&s=64`;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function renderPost(post) {
  const avatarUrl = gravatarUrl(post.email);
  const el = document.createElement('div');
  el.className = 'timeline-post';
  el.innerHTML = `
    <img class="timeline-avatar" src="${avatarUrl}" alt="${escapeHtml(post.name)}'s avatar">
    <div class="timeline-post-body">
      <strong>${escapeHtml(post.name)}</strong>
      <p>${escapeHtml(post.content)}</p>
      <span class="timeline-post-date">${escapeHtml(post.created_at)}</span>
      <button class="timeline-delete-btn" data-id="${post.id}">Delete</button>
    </div>
  `;
  postsContainer.appendChild(el);
}

async function fetchPosts() {
  const res = await fetch('/api/timeline_post');
  const data = await res.json();
  postsContainer.innerHTML = '';
  data.timeline_posts.forEach(renderPost);
}

// Clear stale custom errors as the user types — registered once, at top level,
// not inside the submit handler (which would re-add a new listener every submit).
nameInput.addEventListener('input', () => {
  nameInput.setCustomValidity('');
});

contentInput.addEventListener('input', () => {
  contentInput.setCustomValidity('');
});

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  clearFormError(); // clear any stale error from a prior attempt

  nameInput.value = nameInput.value.trim();
  contentInput.value = contentInput.value.trim();

  nameInput.setCustomValidity(nameInput.value ? '' : 'Name cannot be blank');
  contentInput.setCustomValidity(contentInput.value ? '' : 'Message cannot be blank');

  if (!form.checkValidity()) {
    form.reportValidity();
    return;
  }

  const formData = new FormData(form);
  const res = await fetch('/api/timeline_post', { method: 'POST', body: formData });
  if (res.ok) {
    form.reset();
    fetchPosts();
  } else {
    // read the error message from the JSON body. Both Flask's 400 validation errors and Nginx's 429 rate-limit
    // response use the same {"error": "..."} shape, so this one branch covers both without needing to special-case the status code.
    let message = 'Something went wrong. Please try again.';
    try {
      const data = await res.json();
      if (data && data.error) {
        message = data.error;
      }
    } catch (err) {
        console.error('Failed to parse error response as JSON', err)
    }
    showFormError(message);
    console.error('Failed to create timeline post', res.status);
  }
});

postsContainer.addEventListener('click', async (e) => {
  if (!e.target.classList.contains('timeline-delete-btn')) return;

  const id = e.target.dataset.id;
  const res = await fetch(`/api/timeline_post/${id}`, { method: 'DELETE' });

  if (res.ok) {
    fetchPosts();
  } else {
    console.error('Failed to delete timeline post', res.status);
  }
});

fetchPosts();
</script>



{% endblock %}
