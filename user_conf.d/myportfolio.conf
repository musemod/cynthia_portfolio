# Note: Nginx built-in variables: $host, $request_method, $binary_remote_addr, $remote_addr, etc. — provided by Nginx itself and populated automatically per-request.

# Only assign a rate-limit key to POST requests; GET/DELETE get an empty key, which Nginx treats as "don't rate limit this request"
map $request_method $timeline_post_limit_key {
    default "";
    POST    $binary_remote_addr;
}

limit_req_zone $timeline_post_limit_key zone=timeline_post_limit:10m rate=1r/m;

server {
    listen 80;
    server_name cynthiawong.duckdns.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name cynthiawong.duckdns.org;

    # exact match (=) so this only catches /api/timeline_post itself,
    # not /api/timeline_post/<id> (DELETE route) — that falls
    # through to the general location / block below, unaffected
    location = /api/timeline_post {
    limit_req zone=timeline_post_limit nodelay;
    limit_req_status 429;
    error_page 429 = @rate_limited;
    proxy_pass http://myportfolio:5000/api/timeline_post;
    }

    location @rate_limited {
    default_type application/json;
    return 429 '{"error": "You can only post once per minute. Please wait and try again."}';
    }

    # load certs
    ssl_certificate /etc/letsencrypt/live/cynthiawong.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cynthiawong.duckdns.org/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/cynthiawong.duckdns.org/chain.pem;
}
